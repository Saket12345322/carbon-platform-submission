<nav id="sidebar" aria-label="Main Navigation">
        <h2>Carbon Track</h2>
        <form id="carbonForm" method="POST" action="{% url 'dashboard' %}">
            {% csrf_token %}
            <label for="miles">Daily Driving (Miles):
                <input type="number" id="miles" name="miles" value="10" required aria-required="true" aria-label="Miles driven today">
            </label>
            <br><br>
            <label for="kwh">Electricity Usage (kWh):
                <input type="number" id="kwh" name="kwh" value="5" required aria-required="true" aria-label="Kilowatt hours used">
            </label>
            <br><br>
            <label for="diet">Diet Type:
                <select id="diet" name="diet" aria-label="Dietary preference">
                    <option value="omnivore">Omnivore</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </label>
            <br><br>
            <button type="submit" aria-label="Calculate your carbon footprint">Calculate Footprint</button>
        </form>
        
        <div style="margin-top: 20px; padding: 15px; background: #0b0c10; border-left: 4px solid #c5a059; border-radius: 4px;">
            <strong style="color: #c5a059;">Insight:</strong><br>
            <p style="font-size: 0.9rem; line-height: 1.4;">{{ insight|default:"Enter your daily data to see your impact." }}</p>
        </div>
    </nav>
