<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track and reduce your daily carbon footprint.">
    <title>EcoTrack | Carbon Intelligence</title>
    <style>
        /* WCAG 2.1 AA Compliant High-Contrast Design */
        :root {
            --bg-color: #121212;
            --surface-color: #1E1E1E;
            --primary-accent: #00E676; /* High contrast green */
            --text-main: #FFFFFF;
            --text-muted: #B0BEC5;
            --focus-ring: #29B6F6;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Accessibility Skip Link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary-accent);
            color: #000;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }
        .skip-link:focus { top: 0; }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--surface-color);
            padding: 40px;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
        }

        h1 { margin-top: 0; color: var(--primary-accent); font-size: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main); }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #2C2C2C;
            border: 1px solid #555;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus, select:focus, button:focus {
            outline: 3px solid var(--focus-ring);
            outline-offset: 2px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-accent);
            color: #000000;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #00C853; }

        .results-panel {
            background: #263238;
            padding: 30px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .score-value {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-accent);
            margin: 10px 0;
        }

        .insight-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 230, 118, 0.1);
            border-left: 4px solid var(--primary-accent);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="dashboard-container">
        <section aria-labelledby="form-heading">
            <h1 id="form-heading">Carbon Intelligence</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Total entries tracked: {{ history_count }}</p>

            <form method="POST" action="{% url 'dashboard' %}">
                {% csrf_token %}
                
                <label for="miles">Daily Driving (Miles)</label>
                <input type="number" id="miles" name="miles" value="{{ request.POST.miles|default:10 }}" required min="0" step="0.1" aria-required="true">

                <label for="kwh">Electricity Usage (kWh)</label>
                <input type="number" id="kwh" name="kwh" value="{{ request.POST.kwh|default:5 }}" required min="0" step="0.1" aria-required="true">

                <label for="diet">Dietary Lifestyle</label>
                <select id="diet" name="diet" aria-required="true">
                    <option value="omnivore" {% if request.POST.diet == 'omnivore' %}selected{% endif %}>Omnivore</option>
                    <option value="vegetarian" {% if request.POST.diet == 'vegetarian' %}selected{% endif %}>Vegetarian</option>
                    <option value="vegan" {% if request.POST.diet == 'vegan' %}selected{% endif %}>Vegan</option>
                </select>

                <button type="submit" aria-label="Calculate Footprint">Calculate Footprint</button>
            </form>
        </section>

        <section class="results-panel" aria-live="polite" aria-atomic="true">
            <h2 style="margin:0; font-size: 16px; text-transform: uppercase; color: var(--text-muted);">Total Footprint</h2>
            <div class="score-value" id="score-val">{{ score|default:"0.00" }}</div>
            <div style="color: var(--text-muted);">kg CO₂e / day</div>

            <div class="insight-box" role="status">
                <strong>AI Insight:</strong>
                <p style="margin: 5px 0 0 0;">{{ insight|default:"Awaiting data." }}</p>
            </div>
        </section>
    </main>

</body>
</html>
